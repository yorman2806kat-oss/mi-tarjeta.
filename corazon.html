<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katherine Hernández - My Queen</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
            cursor: pointer; /* Indica que se puede hacer clic */
        }

        .container { position: relative; z-index: 2; }

        h1 { font-size: 2.8rem; margin-bottom: 5px; font-weight: 600; letter-spacing: 1px; }
        h2 { font-size: 1.8rem; margin-top: 0; font-weight: 300; color: #eee; }
        
        .message {
            font-size: 1rem;
            color: #ccc;
            max-width: 500px;
            margin: 15px auto;
            font-style: italic;
        }

        .heart-main {
            font-size: 3.5rem;
            color: #ff0000;
            margin: 20px 0;
            filter: drop-shadow(0 0 15px #ff0000);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .date-container {
            position: relative;
            display: inline-block;
            margin-top: 25px;
            padding: 10px 40px;
        }

        .date-text {
            font-size: 5.5rem;
            font-weight: 800;
            position: relative;
            z-index: 3;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
        }

        .lightning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-3deg);
            width: 110%;
            height: 12px;
            background: #00f2ff;
            filter: blur(8px);
            box-shadow: 0 0 20px #00d4ff, 0 0 40px #0044ff, 0 0 80px #0022ff;
            z-index: 1;
            border-radius: 50%;
        }

        /* Corazones de fondo */
        .heart-bg {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 2px solid #ff2d55;
            transform: rotate(45deg);
            filter: drop-shadow(0 0 10px #ff2d55);
            opacity: 0.4;
        }
        .heart-bg::before, .heart-bg::after {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            background-color: transparent;
            border: 2px solid #ff2d55;
            border-radius: 50%;
        }
        .heart-bg::before { top: -25px; left: -2px; border-bottom: none; border-right: none; }
        .heart-bg::after { left: 25px; top: -2px; border-bottom: none; border-left: none; }

        .h1 { top: 15%; left: 15%; transform: rotate(-20deg) scale(1.2); }
        .h2 { top: 10%; right: 10%; transform: rotate(15deg) scale(1); }
        .h3 { bottom: 20%; left: 30%; transform: rotate(-10deg) scale(0.7); }
        .h4 { bottom: 15%; right: 20%; transform: rotate(25deg) scale(1.5); }

        /* Instrucción para el audio */
        #audio-hint {
            position: fixed;
            bottom: 20px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body onclick="playMusic()">

    <audio id="miMusica" loop>
        <source src="musica.mp3" type="audio/mpeg">
        Tu navegador no soporta el audio.
    </audio>

    <div class="heart-bg h1"></div>
    <div class="heart-bg h2"></div>
    <div class="heart-bg h3"></div>
    <div class="heart-bg h4"></div>

    <div class="container">
        <h1>Katherine Hernández</h1>
        <h2>My Queen</h2>
        
        <p class="message">Eres y siempre seras mi amor, te amo mi reina.</p>

        <div class="heart-main">❤</div>

        <div class="date-container">
            <div class="lightning"></div>
            <div class="date-text">28/06/20</div>
        </div>
    </div>

    <audio id="player" loop>
    <source src="musica.mp3" type="audio/mpeg">
    <source src="musica.ogg" type="audio/ogg">
    Tu navegador no soporta audio.
</audio>
   <script>
    function playMusic() {
        var audio = document.getElementById("player");
        
        // Intentar reproducir y capturar posibles errores
        audio.play().then(() => {
            console.log("Reproducción iniciada correctamente");
            document.getElementById("audio-hint").style.opacity = "0";
        }).catch(error => {
            console.error("Error al reproducir el audio: ", error);
            alert("Asegúrate de que el archivo se llame 'musica.mp3' y esté en la misma carpeta que este HTML.");
        });
    }

    // También intentamos activar al mover el mouse o tocar (para móviles)
    window.addEventListener('touchstart', playMusic, { once: true });
    window.addEventListener('mousedown', playMusic, { once: true });
</script>

</body>
</html>
