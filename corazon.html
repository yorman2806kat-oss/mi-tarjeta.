<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katherine Hernández - My Queen</title>
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #050505; color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; text-align: center;
            cursor: pointer;
        }
        .container { position: relative; z-index: 2; }
        h1 { font-size: 2.5rem; margin-bottom: 5px; }
        h2 { font-size: 1.8rem; margin-top: 0; color: #eee; font-weight: 300; }
        .message { font-size: 1.1rem; color: #ccc; font-style: italic; margin: 15px auto; max-width: 80%; }
        .heart-main {
            font-size: 4rem; color: #ff0000; margin: 20px 0;
            filter: drop-shadow(0 0 15px #ff0000);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        .date-container { position: relative; display: inline-block; margin-top: 25px; }
        .date-text { font-size: 5rem; font-weight: 800; position: relative; z-index: 3; text-shadow: 0 0 15px white; }
        .lightning {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-3deg);
            width: 120%; height: 12px; background: #00f2ff; filter: blur(8px);
            box-shadow: 0 0 20px #00d4ff, 0 0 40px #0044ff; z-index: 1; border-radius: 50%;
        }
        #status-msg {
            position: fixed; bottom: 30px; color: #00f2ff;
            font-size: 0.9rem; letter-spacing: 2px; animation: blink 1.5s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body onclick="tocarMusica()">

    <div class="container">
        <h1>Katherine Hernández</h1>
        <h2>My Queen</h2>
        <p class="message">"Eres y siempre serás mi amor, te amo mi reina."</p>
        <div class="heart-main">❤</div>
        <div class="date-container">
            <div class="lightning"></div>
            <div class="date-text">28/06/20</div>
        </div>
    </div>

    <div id="status-msg">TOCA LA PANTALLA</div>

    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <script>
        function tocarMusica() {
            var audio = document.getElementById("musica");
            audio.play().then(() => {
                document.getElementById("status-msg").style.display = "none";
            }).catch(error => {
                console.log("Esperando clic...");
            });
        }
    </script>
</body>
</html>
