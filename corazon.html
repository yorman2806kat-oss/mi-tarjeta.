<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Para mi Reina Katherine</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; cursor: pointer; }
        canvas { position: absolute; }
        .content { z-index: 10; text-align: center; pointer-events: none; }
        #name { font-size: 2.8rem; color: #ff4d4d; text-shadow: 0 0 20px #ff4d4d; opacity: 0; transition: opacity 2s; margin-bottom: 5px; }
        #msg { font-size: 1.2rem; color: #fff; opacity: 0; transition: all 2s; transform: translateY(20px); letter-spacing: 1px; }
        .instruccion { position: absolute; bottom: 30px; color: #888; font-size: 0.9rem; border: 1px solid #444; padding: 10px 20px; border-radius: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body>
    <audio id="musica" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <div class="content">
        <h1 id="name">Katherine Hernández</h1> 
        <h2 id="msg">My Queen</h2>
    </div>
    <canvas id="heartCanvas"></canvas>
    <div class="instruccion">Toca la pantalla para dedicarte esta canción</div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('musica');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Iniciar música y dibujo al tocar
        document.body.addEventListener('click', () => {
            audio.play();
            document.querySelector('.instruccion').style.opacity = '0';
            setTimeout(() => document.querySelector('.instruccion').remove(), 1000);
        });

        function drawHeart() {
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.strokeStyle = "#ff4d4d";
            ctx.lineWidth = 3;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff4d4d";
            let i = 0;
            const interval = setInterval(() => {
                let t = i;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                ctx.lineTo(x * 15, y * 15);
                ctx.stroke();
                i += 0.05;
                if (i > 6.3) { 
                    clearInterval(interval);
                    document.getElementById('name').style.opacity = "1";
                    setTimeout(() => {
                        document.getElementById('msg').style.opacity = "1";
                        document.getElementById('msg').style.transform = "translateY(0)";
                    }, 1000);
                }
            }, 30);
        }
        drawHeart();
    </script>
</body>
</html>
