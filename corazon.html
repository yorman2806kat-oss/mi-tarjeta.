<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingeniería Informática UNELLEZ</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        canvas {
            position: absolute;
        }

        .content {
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        #name {
            font-size: 3rem;
            color: #ff4d4d;
            text-shadow: 0 0 20px #ff4d4d;
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 2s;
        }

        #final-msg {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #ff4d4d, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(20px);
            transition: all 2s ease-in-out;
        }

        /* Animación de corazones flotando */
        .heart-particle {
            position: absolute;
            color: #ff4d4d;
            animation: float 4s linear infinite;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="content">
        <h1 id="name">Katherine Hernandez</h1> 
        <h2 id="final-msg">¡Que si me gustas? La pregunta es si llegaste a imaginar que yo programara esto para ti!</h2>
    </div>

    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let pixels = [];
        const nameTag = document.getElementById('name');
        const finalMsg = document.getElementById('final-msg');

        // Algoritmo matemático del corazón
        function drawHeart() {
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.strokeStyle = "#ff4d4d";
            ctx.lineWidth = 2;
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff4d4d";

            let i = 0;
            const interval = setInterval(() => {
                // Ecuación paramétrica del corazón
                let t = i;
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
                
                ctx.lineTo(x * 15, y * 15);
                ctx.stroke();

                i += 0.1;
                if (i > 6.3) { // 2 * PI aproximadamente
                    clearInterval(interval);
                    showMessages();
                }
            }, 50);
        }

        function showMessages() {
            nameTag.style.opacity = "1";
            setTimeout(() => {
                finalMsg.style.opacity = "1";
                finalMsg.style.transform = "translateY(0)";
                createParticles();
            }, 2000);
        }

        function createParticles() {
            setInterval(() => {
                const p = document.createElement('div');
                p.innerHTML = "❤";
                p.className = "heart-particle";
                p.style.left = Math.random() * 100 + "vw";
                p.style.fontSize = (Math.random() * 20 + 10) + "px";
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 4000);
            }, 300);
        }

        drawHeart();
    </script>
</body>
</html>
